<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>THE MATTMACHINE</title><style>:root{--bg:#060711;--panel:rgba(9,11,24,.88);--line:rgba(255,255,255,.14);--text:#f8fbff;--muted:#aeb8d6;--pink:#ff2ebd;--cyan:#27e8ff;--green:#6cff65;--yellow:#ffe55c;--red:#ff3d62}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;background:radial-gradient(circle at 10% 0%,rgba(255,46,189,.23),transparent 35%),radial-gradient(circle at 90% 5%,rgba(39,232,255,.2),transparent 34%),linear-gradient(180deg,#090914,#040408);color:var(--text);font-family:system-ui,sans-serif;touch-action:manipulation}.app{max-width:820px;margin:auto;padding:12px}.card{background:var(--panel);border:1px solid var(--line);border-radius:22px;box-shadow:0 18px 70px rgba(0,0,0,.44);backdrop-filter:blur(14px);margin-bottom:10px}header{text-align:center;margin-bottom:10px}.k{color:var(--cyan);font-size:.72rem;font-weight:900;letter-spacing:.22em;text-transform:uppercase}h1{margin:0;font-size:clamp(2.1rem,8vw,4.2rem);line-height:.86;letter-spacing:-.08em;text-shadow:0 0 12px var(--cyan),0 0 28px var(--pink)}.sub{margin:0;color:var(--muted);font-size:.84rem;font-weight:750}.bar{position:sticky;top:0;z-index:5;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:9px}.status{grid-column:1/-1;text-align:center;color:var(--muted);font-size:.78rem;font-weight:800;padding:8px;border-radius:14px;background:rgba(0,0,0,.3)}button,label{min-height:44px;border:0;border-radius:15px;background:rgba(255,255,255,.08);color:var(--text);font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 10px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.14)}button:active{transform:scale(.96);filter:brightness(1.25)}.primary{background:linear-gradient(135deg,rgba(39,232,255,.95),rgba(255,46,189,.72))}.good{background:linear-gradient(135deg,rgba(108,255,101,.85),rgba(39,232,255,.62));color:#06120a}.danger{background:linear-gradient(135deg,rgba(255,61,98,.95),rgba(255,46,189,.8))}.viz{height:60px;padding:8px}.viz canvas{width:100%;height:100%;display:block;border-radius:15px;background:rgba(0,0,0,.34);border:1px solid rgba(39,232,255,.18)}.pads{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:9px}.pad{min-height:88px;border-radius:18px;padding:8px;text-align:left;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(255,255,255,.07),rgba(0,0,0,.34));border:1px solid rgba(255,255,255,.12);filter:brightness(.78)}.pad b{font-size:.82rem;text-transform:uppercase}.pad small{color:rgba(255,255,255,.72);font-size:.6rem;font-weight:900;text-transform:uppercase}.pad span{position:absolute;right:8px;bottom:-2px;font-size:1.6rem;font-weight:1000;opacity:.15}.loaded{filter:brightness(.95)}.play{filter:brightness(1.26);box-shadow:0 0 24px rgba(39,232,255,.45),inset 0 0 0 2px rgba(39,232,255,.55)}.loop{outline:2px solid rgba(108,255,101,.7)}.muted{filter:grayscale(.9) brightness(.42)}.sel{outline:3px solid var(--yellow)}.pad:nth-child(8n+1){background:linear-gradient(135deg,#4d2b08,#080400)}.pad:nth-child(8n+2){background:linear-gradient(135deg,#4a0716,#080004)}.pad:nth-child(8n+3){background:linear-gradient(135deg,#4e4207,#0b0800)}.pad:nth-child(8n+4){background:linear-gradient(135deg,#361052,#07000d)}.pad:nth-child(8n+5){background:linear-gradient(135deg,#164a12,#020900)}.pad:nth-child(8n+6){background:linear-gradient(135deg,#132f63,#000611)}.pad:nth-child(8n+7){background:linear-gradient(135deg,#5a0f46,#0d0008)}.pad:nth-child(8n+8){background:linear-gradient(135deg,#0b4e58,#001014)}.tools{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:9px}.footer{text-align:center;color:var(--muted);font-size:.74rem;font-weight:800;padding:6px}@media(max-width:540px){.bar,.tools{grid-template-columns:1fr 1fr}.pads{gap:6px}.pad{min-height:76px;padding:7px}.pad b{font-size:.74rem}}</style></head><body><main class="app"><header><div class="k">autoload sampler</div><h1>THE MATTMACHINE</h1><p class="sub">loads /samples/index.json into 16 pads</p></header><section class="bar card"><button id="wake" class="primary">WAKE</button><label>IMPORT<input id="file" type="file" accept="audio/*" hidden></label><button id="reload" class="good">RELOAD</button><button id="stop" class="danger">STOP</button><button id="loop">LOOP</button><button id="mute">MUTE</button><button id="clear">CLEAR</button><button id="slice">SLICE</button><div id="status" class="status">booting · checking samples/index.json</div></section><section class="viz card"><canvas id="viz"></canvas></section><section id="pads" class="pads card"></section><section class="tools card"><button id="prev">PREV</button><button id="next">NEXT</button><button id="dupe">DUPE</button><button id="panic">PANIC</button></section><div class="footer">MATTBEAR · bearicide.github.io</div></main><script>const keys=['1','2','3','4','q','w','e','r','a','s','d','f','z','x','c','v'];const pads=Array.from({length:16},(_,i)=>({name:'PAD '+(i+1),key:keys[i],buf:null,loop:false,mute:false,play:false,path:''}));let ctx,master,an,sel=0,active=new Map();const $=id=>document.getElementById(id),padsEl=$('pads'),status=$('status'),viz=$('viz'),v=viz.getContext('2d');function msg(t){status.textContent=t}async function wake(){if(!ctx){ctx=new(window.AudioContext||window.webkitAudioContext)();master=ctx.createGain();master.gain.value=.9;an=ctx.createAnalyser();an.fftSize=128;master.connect(an);an.connect(ctx.destination);drawViz()}if(ctx.state!=='running')await ctx.resume()}function drawViz(){let data=new Uint8Array(an.frequencyBinCount);function f(){let w=viz.clientWidth,h=viz.clientHeight;viz.width=w*devicePixelRatio;viz.height=h*devicePixelRatio;v.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0);v.clearRect(0,0,w,h);v.fillStyle='rgba(0,0,0,.35)';v.fillRect(0,0,w,h);an.getByteFrequencyData(data);let bw=w/data.length;for(let i=0;i<data.length;i++){let x=i*bw,bar=data[i]/255*h*.9;v.fillStyle=i%2?'rgba(255,46,189,.75)':'rgba(39,232,255,.75)';v.fillRect(x,h-bar,bw*.65,bar)}requestAnimationFrame(f)}f()}function render(){padsEl.innerHTML='';pads.forEach((p,i)=>{let b=document.createElement('button');b.className='pad '+(p.buf?'loaded ':'')+(p.play?'play ':'')+(p.loop?'loop ':'')+(p.mute?'muted ':'')+(i===sel?'sel':'');b.innerHTML='<small>'+p.key.toUpperCase()+' · '+(p.buf?'loaded':'empty')+'</small><b>'+p.name+'</b><span>'+(i+1)+'</span>';b.onclick=()=>{sel=i;hit(i);render()};padsEl.appendChild(b)})}function stop(i){let a=active.get(i);if(a){try{a.stop()}catch(e){}active.delete(i)}pads[i].play=false}function stopAll(){[...active.keys()].forEach(stop);render();msg('stopped')}function gain(p){let g=ctx.createGain();g.gain.value=.9;g.connect(master);return g}function synth(i){let o=ctx.createOscillator(),g=gain();o.type=i%2?'square':'sawtooth';o.frequency.value=[80,160,220,330,440,55,660,880,120,240,360,480,600,720,840,960][i];o.connect(g);o.start();o.stop(ctx.currentTime+.25);pads[i].play=true;setTimeout(()=>{pads[i].play=false;render()},280)}async function hit(i){await wake();let p=pads[i];if(p.mute)return;if(p.loop&&active.has(i)){stop(i);return render()}if(!p.buf){synth(i);return render()}let s=ctx.createBufferSource();s.buffer=p.buf;s.loop=p.loop;s.connect(gain(p));s.start();active.set(i,s);p.play=true;s.onended=()=>{active.delete(i);p.play=false;render()}}async function loadArray(arr,i,name,path){await wake();let b=await ctx.decodeAudioData(arr.slice(0));pads[i].buf=b;pads[i].name=name.replace(/\.[^.]+$/,'').replace(/[_-]+/g,' ').slice(0,18)||('SAMPLE '+(i+1));pads[i].path=path;pads[i].loop=true}async function autoload(){try{msg('autoload: reading samples/index.json');let r=await fetch('samples/index.json',{cache:'no-store'});if(!r.ok)throw Error('missing index');let j=await r.json(),files=(j.files||[]).slice(0,16);if(!j.autoload||!files.length){msg('index found · no files listed');return}let n=0;for(let i=0;i<files.length;i++){try{let file=files[i],rr=await fetch('samples/'+encodeURIComponent(file));if(!rr.ok)throw Error('missing '+file);await loadArray(await rr.arrayBuffer(),i,file,'samples/'+file);n++;render();msg('autoload '+n+'/'+files.length)}catch(e){console.warn(e)}}msg(n?'autoload complete · '+n+' pads ready':'autoload found no loadable files')}catch(e){console.warn(e);msg('autoload unavailable · import or use synth pads')}}$('wake').onclick=async()=>{await wake();msg('audio awake')};$('reload').onclick=autoload;$('stop').onclick=stopAll;$('loop').onclick=()=>{pads[sel].loop=!pads[sel].loop;render()};$('mute').onclick=()=>{pads[sel].mute=!pads[sel].mute;stop(sel);render()};$('clear').onclick=()=>{stop(sel);pads[sel]={name:'PAD '+(sel+1),key:keys[sel],buf:null,loop:false,mute:false,play:false,path:''};render()};$('prev').onclick=()=>{sel=(sel+15)%16;render()};$('next').onclick=()=>{sel=(sel+1)%16;render()};$('dupe').onclick=()=>{pads[(sel+1)%16]={...pads[sel],name:pads[sel].name+' COPY'};render()};$('panic').onclick=()=>{stopAll();if(ctx){ctx.close();ctx=null}msg('panic reset')};$('file').onchange=async e=>{let f=e.target.files[0];if(!f)return;await loadArray(await f.arrayBuffer(),sel,f.name,'local');render();msg('imported to pad '+(sel+1))};$('slice').onclick=()=>{let src=pads[sel].buf;if(!src)return msg('select loaded pad first');for(let i=0;i<16;i++){pads[i].buf=src;pads[i].name='CHOP '+(i+1);pads[i].loop=true}render();msg('quick duplicated sample across 16 pads')};document.addEventListener('keydown',e=>{let i=keys.indexOf(e.key.toLowerCase());if(i>-1){e.preventDefault();sel=i;hit(i)}if(e.code==='Space'){e.preventDefault();hit(sel)}if(e.key==='Escape')stopAll()});render();autoload();</script></body></html>
