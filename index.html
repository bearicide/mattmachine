<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>THE MATTMACHINE</title><style>:root{--panel:rgba(9,11,24,.88);--line:rgba(255,255,255,.14);--text:#f8fbff;--muted:#aeb8d6;--pink:#ff2ebd;--cyan:#27e8ff;--green:#6cff65;--yellow:#ffe55c;--red:#ff3d62}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;min-height:100%;color:var(--text);font-family:system-ui,sans-serif;touch-action:manipulation;background:#050611}body:before{content:"";position:fixed;inset:0;z-index:-2;background:url("assets/MATTBEAR%20-%20Background%20%20hatGPT%20Image%20May%2017%2C%202026%2C%2008_31_42%20PM.png") center top/cover no-repeat;filter:saturate(1.15) contrast(1.05);opacity:.34}body:after{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;background:radial-gradient(circle at 10% 0%,rgba(255,46,189,.22),transparent 35%),radial-gradient(circle at 90% 5%,rgba(39,232,255,.18),transparent 34%),linear-gradient(180deg,rgba(5,6,17,.58),rgba(4,4,8,.92));}.app{max-width:820px;margin:auto;padding:12px}.card{background:var(--panel);border:1px solid var(--line);border-radius:22px;box-shadow:0 18px 70px rgba(0,0,0,.44);backdrop-filter:blur(14px);margin-bottom:10px}header{text-align:center;margin-bottom:8px}.k{color:var(--cyan);font-size:.72rem;font-weight:900;letter-spacing:.22em;text-transform:uppercase;text-shadow:0 2px 2px #000,0 0 10px rgba(39,232,255,.55)}h1{margin:0;font-size:clamp(2.1rem,8vw,4.2rem);line-height:.86;letter-spacing:-.055em;color:#f8fbff;-webkit-text-stroke:1px rgba(3,4,10,.85);text-shadow:0 3px 0 rgba(0,0,0,.95),0 0 8px rgba(39,232,255,.85),0 0 20px rgba(255,46,189,.55),0 0 38px rgba(39,232,255,.28)}.sub{margin:0;color:var(--muted);font-size:.84rem;font-weight:750;text-shadow:0 2px 2px #000}.help{padding:10px 12px;display:grid;gap:8px}.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:7px}.step{background:rgba(0,0,0,.24);border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:8px;font-size:.72rem;color:var(--muted);font-weight:800;line-height:1.25}.step b{display:block;color:#fff;font-size:.76rem;margin-bottom:2px}.bar,.tools{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:9px}.status{grid-column:1/-1;text-align:center;color:var(--muted);font-size:.72rem;font-weight:800;padding:6px;border-radius:12px;background:rgba(0,0,0,.24)}button,label{min-height:44px;border:0;border-radius:15px;background:rgba(255,255,255,.08);color:var(--text);font-weight:900;display:flex;align-items:center;justify-content:center;padding:0 10px;box-shadow:inset 0 0 0 1px rgba(255,255,255,.14)}button:active{transform:scale(.96);filter:brightness(1.25)}.primary{background:linear-gradient(135deg,rgba(39,232,255,.95),rgba(255,46,189,.72))}.good{background:linear-gradient(135deg,rgba(108,255,101,.85),rgba(39,232,255,.62));color:#06120a}.danger{background:linear-gradient(135deg,rgba(255,61,98,.95),rgba(255,46,189,.8))}.chaosOn{background:linear-gradient(135deg,#ffe55c,#ff2ebd)!important;color:#050611!important;box-shadow:0 0 24px rgba(255,229,92,.45)}.viz{height:60px;padding:8px}.viz canvas{width:100%;height:100%;display:block;border-radius:15px;background:rgba(0,0,0,.34);border:1px solid rgba(39,232,255,.18)}.pads{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:9px}.pad{min-height:88px;border-radius:18px;padding:8px;text-align:left;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;background:linear-gradient(135deg,rgba(255,255,255,.07),rgba(0,0,0,.34));border:1px solid rgba(255,255,255,.12);filter:brightness(.78);transition:all .22s ease}.pad b{font-size:.82rem;text-transform:uppercase}.pad small{color:rgba(255,255,255,.72);font-size:.6rem;font-weight:900;text-transform:uppercase}.pad span{position:absolute;right:8px;bottom:-2px;font-size:1.6rem;font-weight:1000;opacity:.15}.loaded{filter:brightness(.95)}.play{filter:brightness(1.26);box-shadow:0 0 24px rgba(39,232,255,.45),inset 0 0 0 2px rgba(39,232,255,.55)}.loop{outline:2px solid rgba(108,255,101,.7)}.muted{filter:grayscale(.9) brightness(.42)}.sel{outline:3px solid var(--yellow)}.chaosDead{opacity:.12!important;filter:brightness(.12) blur(.4px)!important;pointer-events:none}.chaosLive{box-shadow:0 0 26px rgba(255,46,189,.38),0 0 12px rgba(39,232,255,.26)}.footer{text-align:center;color:var(--muted);font-size:.74rem;font-weight:800;padding:6px}@media(max-width:540px){body:before{opacity:.26;background-position:center top}.bar,.tools,.steps{grid-template-columns:1fr 1fr}.pads{gap:6px}.pad{min-height:76px;padding:7px}.pad b{font-size:.74rem}}</style></head><body><main class="app"></main><script>async function autoload(){try{msg('autoload: reading samples/index.json');let r=await fetch('samples/index.json',{cache:'no-store'});if(!r.ok)throw Error('missing index');let j=await r.json(),files=(j.files||[]).slice(0,16);let n=0;for(let i=0;i<files.length;i++){try{let file=files[i],rr=await fetch('samples/'+file);if(!rr.ok)throw Error('missing '+file);await loadArray(await rr.arrayBuffer(),i,file,'samples/'+file);n++;render()}catch(e){console.warn(e)}}msg(n?'autoload complete · '+n+' pads ready':'autoload found no loadable files')}catch(e){console.warn(e);msg('autoload unavailable')}}</script></body></html>
