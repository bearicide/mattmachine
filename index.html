<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>THE MATTMACHINE</title>
<style>
body{margin:0;background:#050611;color:#f8fbff;font-family:system-ui,sans-serif}body:before{content:"";position:fixed;inset:0;background:url("assets/MATTBEAR%20-%20Background%20%20hatGPT%20Image%20May%2017%2C%202026%2C%2008_31_42%20PM.png") center/cover no-repeat;opacity:.28;z-index:-2}body:after{content:"";position:fixed;inset:0;background:linear-gradient(180deg,rgba(5,6,17,.58),rgba(4,4,8,.94));z-index:-1}.app{max-width:860px;margin:auto;padding:14px}.card{background:rgba(9,11,24,.88);border:1px solid rgba(255,255,255,.15);border-radius:22px;padding:12px;margin:10px 0;box-shadow:0 18px 60px rgba(0,0,0,.45)}h1{text-align:center;font-size:clamp(2.2rem,9vw,4.4rem);line-height:.9;margin:8px 0;text-shadow:0 0 18px #27e8ff,0 0 28px #ff2ebd}.links,.bar,.tools{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}a,button,label{min-height:44px;border:0;border-radius:15px;background:rgba(255,255,255,.08);color:#f8fbff;font-weight:900;display:flex;align-items:center;justify-content:center;text-decoration:none;padding:0 10px}.primary{background:linear-gradient(135deg,#27e8ff,#ff2ebd)}.good{background:linear-gradient(135deg,#6cff65,#27e8ff);color:#06120a}.danger{background:linear-gradient(135deg,#ff3d62,#ff2ebd)}#status{grid-column:1/-1;text-align:center;color:#aeb8d6;font-size:.78rem;font-weight:800}.pads{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.pad{min-height:84px;display:block;text-align:left;padding:9px;border-radius:18px;background:linear-gradient(135deg,rgba(255,255,255,.08),rgba(0,0,0,.35));border:1px solid rgba(255,255,255,.12)}.pad small{display:block;color:#aeb8d6;font-size:.66rem}.pad b{display:block;margin-top:16px}.loaded{box-shadow:0 0 24px rgba(39,232,255,.35)}.play{outline:3px solid #27e8ff}.sel{outline:3px solid #ffe55c}.foot{text-align:center;color:#aeb8d6}@media(max-width:560px){.links,.bar,.tools{grid-template-columns:1fr 1fr}.pad{min-height:76px}}
</style>
</head>
<body>
<main class="app">
<div class="links card"><a class="primary" href="https://bearicide.github.io/">MAIN</a><a href="https://bearicide.github.io/music-toys/">MUSIC TOYS</a><a href="https://bearicide.github.io/MATTBEARCADE/">ARCADE</a><a href="https://bearicide.github.io/examples/">EXAMPLES</a></div>
<header><div style="text-align:center;color:#27e8ff;font-weight:900;letter-spacing:.2em">AUTOLOAD SAMPLER</div><h1>THE MATTMACHINE</h1><p style="text-align:center;color:#aeb8d6;font-weight:800">16 pads · forgiving loader · weird filenames accepted</p></header>
<section class="bar card"><button id="wake" class="primary">WAKE</button><label>IMPORT<input id="file" type="file" accept="audio/*" hidden></label><button id="reload" class="good">RELOAD</button><button id="stop" class="danger">STOP</button><div id="status">checking sample manifests</div></section>
<section id="pads" class="pads card"></section>
<section class="tools card"><button id="loop">LOOP</button><button id="mute">MUTE</button><button id="dupe">DUPE</button><button id="clear">CLEAR</button></section>
<footer class="foot card">MATTBEAR · <a style="display:inline;color:#27e8ff;background:none;min-height:0;padding:0" href="https://bearicide.github.io/">bearicide.github.io</a></footer>
</main>
<script>
const keys=['1','2','3','4','q','w','e','r','a','s','d','f','z','x','c','v'];
const pads=Array.from({length:16},(_,i)=>({name:'PAD '+(i+1),key:keys[i],buf:null,loop:false,mute:false,play:false,path:''}));
let ctx,master,sel=0,active=new Map();const $=id=>document.getElementById(id),padsEl=$('pads'),status=$('status');
function msg(t){status.textContent=t}async function wake(){if(!ctx){ctx=new(window.AudioContext||window.webkitAudioContext)();master=ctx.createGain();master.gain.value=.9;master.connect(ctx.destination)}if(ctx.state!=='running')await ctx.resume()}
function render(){padsEl.innerHTML='';pads.forEach((p,i)=>{let b=document.createElement('button');b.className='pad '+(p.buf?'loaded ':'')+(p.play?'play ':'')+(i===sel?'sel ':'');b.innerHTML='<small>'+p.key.toUpperCase()+' · '+(p.buf?'loaded':'empty')+'</small><b>'+p.name+'</b>';b.onclick=()=>{sel=i;hit(i);render()};padsEl.appendChild(b)})}
function stop(i){let a=active.get(i);if(a){try{a.stop()}catch(e){}active.delete(i)}pads[i].play=false}function stopAll(){[...active.keys()].forEach(stop);render();msg('stopped')}
function gain(){let g=ctx.createGain();g.gain.value=.9;g.connect(master);return g}function synth(i){let o=ctx.createOscillator(),g=gain();o.type=i%2?'square':'sawtooth';o.frequency.value=[80,160,220,330,440,55,660,880,120,240,360,480,600,720,840,960][i];o.connect(g);o.start();o.stop(ctx.currentTime+.2)}
async function hit(i){await wake();let p=pads[i];if(!p.buf){synth(i);return}if(p.loop&&active.has(i)){stop(i);return render()}let s=ctx.createBufferSource();s.buffer=p.buf;s.loop=p.loop;s.connect(gain());s.start();active.set(i,s);p.play=true;s.onended=()=>{active.delete(i);p.play=false;render()}}
async function loadArray(arr,i,name,path){await wake();let b=await ctx.decodeAudioData(arr.slice(0));pads[i].buf=b;pads[i].name=name.replace(/\.[^.]+$/,'').replace(/[_-]+/g,' ').slice(0,20);pads[i].path=path;pads[i].loop=true}
async function fetchFirst(paths){for(const p of paths){try{let r=await fetch(p,{cache:'no-store'});if(r.ok)return {r,path:p}}catch(e){}}return null}
function guesses(file){let raw=String(file||'').trim(),enc=raw.split('/').map(encodeURIComponent).join('/'),dirs=['samples/','samples/packs/','packs/',''];let out=[];for(const d of dirs){out.push(d+raw,d+enc)}return [...new Set(out)]}
async function manifest(){for(const m of ['samples/index.json','samples/packs/index.json','packs/index.json','index.json']){let hit=await fetchFirst([m]);if(hit){let j=await hit.r.json();return Array.isArray(j)?j:(j.files||[])}}return []}
async function autoload(){let files=(await manifest()).slice(0,16);let n=0,miss=0;if(!files.length){msg('no manifest found');return}for(let i=0;i<files.length;i++){let hit=await fetchFirst(guesses(files[i]));if(!hit){miss++;console.warn('missing',files[i]);continue}try{await loadArray(await hit.r.arrayBuffer(),i,files[i],hit.path);n++;render()}catch(e){miss++;console.warn(e)}}msg('autoload complete · '+n+' loaded'+(miss?' · '+miss+' missed':''))}
$('wake').onclick=async()=>{await wake();msg('audio awake')};$('reload').onclick=autoload;$('stop').onclick=stopAll;$('loop').onclick=()=>{pads[sel].loop=!pads[sel].loop;render()};$('mute').onclick=()=>{stop(sel);pads[sel].buf=null;render()};$('dupe').onclick=()=>{pads[(sel+1)%16]={...pads[sel],name:pads[sel].name+' COPY'};render()};$('clear').onclick=()=>{stop(sel);pads[sel]={name:'PAD '+(sel+1),key:keys[sel],buf:null,loop:false,mute:false,play:false,path:''};render()};$('file').onchange=async e=>{let f=e.target.files[0];if(!f)return;await loadArray(await f.arrayBuffer(),sel,f.name,'local');render();msg('imported')};document.addEventListener('keydown',e=>{let i=keys.indexOf(e.key.toLowerCase());if(i>-1){e.preventDefault();sel=i;hit(i)}});render();autoload();
</script>
</body>
</html>
