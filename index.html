<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>THE MATTMACHINE</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#fff;--fg:#000;--soft:#f3f3f3;--hot:#000}
body{margin:0;background:var(--bg);color:var(--fg);font-family:Arial,Helvetica,sans-serif}
main{max-width:1100px;margin:auto;padding:16px}
.header{border:2px solid #000;padding:18px;margin-bottom:12px;background:#fff}
.small{font-size:.72rem;letter-spacing:.22em;font-weight:700;margin-bottom:8px}
h1{margin:0;font-size:clamp(2rem,8vw,5.4rem);line-height:.9;font-weight:900;letter-spacing:-.06em}
.desc{margin-top:10px;font-size:.95rem;font-weight:700;max-width:820px;line-height:1.4}
.grid{display:grid;gap:10px}.top,.controls,.tools{grid-template-columns:repeat(4,1fr);margin-bottom:12px}.pads{grid-template-columns:repeat(4,1fr)}
button,label,select,a{background:#fff;color:#000;border:2px solid #000;min-height:54px;padding:10px;font-weight:900;text-decoration:none;display:flex;align-items:center;justify-content:center;cursor:pointer;text-align:center}
button:hover,label:hover,a:hover,select:hover{background:#eee}.danger{background:#000;color:#fff}.danger:hover{background:#222}.hot{outline:4px solid #000}
.pad{min-height:124px;display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-start;text-align:left;position:relative;padding:12px;touch-action:none;overflow:hidden}
.pad small{font-size:.7rem;font-weight:900;letter-spacing:.12em}.pad strong{font-size:1rem;margin-top:18px;line-height:1.1}.pad em{font-style:normal;font-size:.66rem;font-weight:900;margin-top:auto;opacity:.75}
.pad::after{content:"";position:absolute;right:0;bottom:0;width:42px;height:42px;border-right:2px solid #000;border-bottom:2px solid #000;clip-path:polygon(100% 0,100% 100%,0 100%)}
.loaded{background:var(--soft)}.playing{background:#000;color:#fff}.looping{outline:4px solid #000}.selected{box-shadow:inset 0 0 0 4px #000}.recording{animation:pulse .45s infinite alternate;background:#000;color:#fff}
@keyframes pulse{from{filter:invert(0)}to{filter:invert(1)}}
#status{grid-column:1/-1;font-size:.8rem;font-weight:900;padding:4px 0;min-height:24px}.footer{margin-top:12px;border:2px solid #000;padding:12px;font-size:.78rem;font-weight:900;display:flex;justify-content:space-between;gap:12px}
body.performance main{max-width:none;padding:8px}body.performance .top,body.performance .footer{display:none}body.performance .header{padding:10px;margin-bottom:8px}body.performance h1{font-size:clamp(2.4rem,10vw,7rem)}body.performance .pad{min-height:18vh;font-size:1.2rem}
@media(max-width:760px){.top,.controls,.tools,.pads{grid-template-columns:1fr 1fr}.pad{min-height:104px}main{padding:10px}}
</style>
</head>
<body>
<main>
<div class="header">
<div class="small">INDUSTRIAL LOOP CHOPPER SYSTEM</div>
<h1>THE MATTMACHINE</h1>
<div class="desc">IMPORT AUDIO. AUTO CHOP. TAP FOR ONE-SHOT. HOLD FOR LOOP. RECORD TO PAD. GLOBAL CHOKE KILLS STACKED GHOSTS.</div>
</div>
<div class="grid top">
<a href="https://bearicide.github.io/">MAIN</a><a href="https://bearicide.github.io/music-toys/">TOOLS</a><a href="https://bearicide.github.io/MATTBEARCADE/">ARCADE</a><a href="https://bearicide.github.io/examples/">EXAMPLES</a>
</div>
<div class="grid controls">
<button id="wake">WAKE</button>
<label>IMPORT<input id="file" type="file" accept="audio/*" hidden></label>
<button id="stop" class="danger">STOP</button>
<select id="sliceCount"><option value="16">16 CHOPS</option><option value="8">8 CHOPS</option><option value="4">4 CHOPS</option></select>
<div id="status">SYSTEM READY</div>
</div>
<div id="pads" class="grid pads"></div>
<div class="grid tools">
<button id="choke">CHOKE ON</button><button id="record">REC PAD</button><button id="reverse">REVERSE PAD</button><button id="randomize">RANDOMIZE</button>
<button id="clear">CLEAR PAD</button><button id="clearBank">CLEAR BANK</button><button id="clearAll">CLEAR ALL</button><button id="panic" class="danger">PANIC</button>
<button id="perf">PERFORMANCE</button><button id="pitch">DIRTY PITCH OFF</button><button id="copyPad">COPY PAD</button><button id="pastePad">PASTE PAD</button>
</div>
<div class="footer"><div>MATTBEAR SYSTEMS</div><div>bearicide.github.io</div></div>
</main>
<script>
const keys=['1','2','3','4','q','w','e','r','a','s','d','f','z','x','c','v'];
const pads=Array.from({length:16},(_,i)=>({name:'CHOP '+(i+1),key:keys[i],buffer:null,playing:false,looping:false,tag:'EMPTY'}));
let ctx,master,selected=0,choke=true,activeLoop=null,pointerLock=false,dirtyPitch=false,copiedBuffer=null,copiedName='';
let recorder=null,recordChunks=[],recordStream=null,importToken=0;
const activeShots=new Set(),heldKeys=new Set();
const padsEl=document.getElementById('pads'),statusEl=document.getElementById('status');
function status(t){statusEl.textContent=t}
async function wake(){if(!ctx){ctx=new(window.AudioContext||window.webkitAudioContext)();master=ctx.createGain();master.gain.value=.9;master.connect(ctx.destination)}if(ctx.state!=='running')await ctx.resume()}
function createGain(){const g=ctx.createGain();g.gain.cancelScheduledValues(ctx.currentTime);g.gain.setValueAtTime(0,ctx.currentTime);g.gain.linearRampToValueAtTime(.9,ctx.currentTime+.006);g.connect(master);return g}
function fadeAndStop(source,gain,time=.014){if(!ctx||!source)return;try{if(gain){gain.gain.cancelScheduledValues(ctx.currentTime);gain.gain.setValueAtTime(gain.gain.value,ctx.currentTime);gain.gain.linearRampToValueAtTime(0,ctx.currentTime+time)}source.stop(ctx.currentTime+time+.002)}catch(e){}setTimeout(()=>{try{source.disconnect()}catch(e){}try{gain&&gain.disconnect()}catch(e){}},Math.ceil((time+.03)*1000))}
function killShot(entry){if(!entry)return;fadeAndStop(entry.source,entry.gain,.01);activeShots.delete(entry)}
function stopAllShots(){activeShots.forEach(entry=>killShot(entry));activeShots.clear()}
function stopPadShots(index){activeShots.forEach(entry=>{if(entry.index===index)killShot(entry)})}
function stopLoop(){if(!activeLoop)return;const loop=activeLoop;activeLoop=null;fadeAndStop(loop.source,loop.gain);pads[loop.index].looping=false;pads[loop.index].playing=[...activeShots].some(s=>s.index===loop.index);draw()}
function panic(){stopLoop();stopAllShots();heldKeys.clear();pads.forEach(p=>{p.playing=false;p.looping=false});draw();status('STOPPED')}
function globalChoke(){stopLoop();stopAllShots();pads.forEach(p=>{p.playing=false;p.looping=false})}
function draw(){padsEl.innerHTML='';pads.forEach((pad,i)=>{const b=document.createElement('button');b.className='pad '+(pad.buffer?'loaded ':'')+(pad.playing?'playing ':'')+(pad.looping?'looping ':'')+(i===selected?'selected ':'')+(recorder&&i===selected?'recording ':'');b.innerHTML=`<small>${pad.key.toUpperCase()} / PAD ${i+1}</small><strong>${pad.name}</strong><em>${pad.tag}</em>`;let held=false,timer;b.onpointerdown=e=>{e.preventDefault();if(pointerLock)return;pointerLock=true;selected=i;held=false;timer=setTimeout(()=>{held=true;startLoop(i)},180);draw()};b.onpointerup=e=>{e.preventDefault();pointerLock=false;clearTimeout(timer);if(held)stopLoop();else play(i);draw()};b.onpointercancel=()=>{pointerLock=false;clearTimeout(timer);if(held)stopLoop()};padsEl.appendChild(b)})}
function beep(i){const o=ctx.createOscillator(),g=createGain();o.frequency.value=120+(i*30);o.connect(g);o.start();o.stop(ctx.currentTime+.1);o.onended=()=>{try{o.disconnect()}catch(e){}try{g.disconnect()}catch(e){}}}
async function play(i){await wake();const p=pads[i];selected=i;if(!p.buffer){beep(i);status('EMPTY PAD '+(i+1));draw();return}if(choke)globalChoke();else stopPadShots(i);const source=ctx.createBufferSource(),gain=createGain(),shot={index:i,source,gain};source.buffer=p.buffer;if(dirtyPitch)source.playbackRate.value=.88+Math.random()*.28;source.connect(gain);source.onended=()=>{activeShots.delete(shot);try{source.disconnect()}catch(e){}try{gain.disconnect()}catch(e){}if(![...activeShots].some(s=>s.index===i)&&!(activeLoop&&activeLoop.index===i))p.playing=false;draw()};activeShots.add(shot);p.playing=true;source.start();status('PLAY PAD '+(i+1));draw()}
async function startLoop(i){await wake();const p=pads[i];selected=i;if(!p.buffer){beep(i);status('EMPTY LOOP '+(i+1));return}if(activeLoop?.index===i)return;if(choke)globalChoke();else stopLoop();const source=ctx.createBufferSource(),gain=createGain();source.buffer=p.buffer;source.loop=true;if(dirtyPitch)source.playbackRate.value=.92+Math.random()*.18;source.connect(gain);source.onended=()=>{try{source.disconnect()}catch(e){}try{gain.disconnect()}catch(e){}};source.start();activeLoop={index:i,source,gain};p.looping=true;p.playing=true;status('LOOP PAD '+(i+1));draw()}
function cutBuffer(source,start,end){const sr=source.sampleRate,startFrame=Math.floor(start*sr),endFrame=Math.floor(end*sr),length=Math.max(1,endFrame-startFrame),fade=Math.min(128,length>>1),out=ctx.createBuffer(source.numberOfChannels,length,sr);for(let ch=0;ch<source.numberOfChannels;ch++){const data=source.getChannelData(ch).slice(startFrame,endFrame);for(let i=0;i<fade;i++){data[i]*=i/fade;data[data.length-1-i]*=i/fade}out.copyToChannel(data,ch)}return out}
function cloneBuffer(buffer){const out=ctx.createBuffer(buffer.numberOfChannels,buffer.length,buffer.sampleRate);for(let ch=0;ch<buffer.numberOfChannels;ch++)out.copyToChannel(buffer.getChannelData(ch),ch);return out}
function reverseSelected(){const p=pads[selected];if(!p.buffer){status('NO BUFFER TO REVERSE');return}const out=ctx.createBuffer(p.buffer.numberOfChannels,p.buffer.length,p.buffer.sampleRate);for(let ch=0;ch<p.buffer.numberOfChannels;ch++){const data=Array.from(p.buffer.getChannelData(ch)).reverse();out.copyToChannel(new Float32Array(data),ch)}p.buffer=out;p.tag='REVERSED';status('REVERSED PAD '+(selected+1));draw()}
async function chop(file){await wake();const token=++importToken;panic();status('DECODING...');const arr=await file.arrayBuffer();if(token!==importToken)return;const source=await ctx.decodeAudioData(arr.slice(0));if(token!==importToken)return;const count=parseInt(document.getElementById('sliceCount').value,10),sliceLength=source.duration/count;clearAll(false);for(let i=0;i<count;i++){pads[i].buffer=cutBuffer(source,i*sliceLength,(i+1)*sliceLength);pads[i].name='CHOP '+String(i+1).padStart(2,'0');pads[i].tag='LOADED'}status('CHOPPED '+count+' SLICES');draw()}
function clearPad(i){stopPadShots(i);if(activeLoop?.index===i)stopLoop();pads[i]={name:'CHOP '+(i+1),key:keys[i],buffer:null,playing:false,looping:false,tag:'EMPTY'}}
function clearAll(show=true){panic();for(let i=0;i<16;i++)clearPad(i);if(show)status('ALL SOUNDS CLEARED');draw()}
function randomizePads(){panic();const loaded=pads.map((p,i)=>({p,i})).filter(x=>x.p.buffer);for(let i=loaded.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[loaded[i].p.buffer,loaded[j].p.buffer]=[loaded[j].p.buffer,loaded[i].p.buffer];[loaded[i].p.name,loaded[j].p.name]=[loaded[j].p.name,loaded[i].p.name];[loaded[i].p.tag,loaded[j].p.tag]=[loaded[j].p.tag,loaded[i].p.tag]}status('PAD ORDER RANDOMIZED');draw()}
async function toggleRecord(){await wake();if(recorder&&recorder.state==='recording'){recorder.stop();return}if(!navigator.mediaDevices?.getUserMedia){status('MIC RECORD NOT SUPPORTED');return}try{recordStream=await navigator.mediaDevices.getUserMedia({audio:true});recordChunks=[];recorder=new MediaRecorder(recordStream);recorder.ondataavailable=e=>{if(e.data.size)recordChunks.push(e.data)};recorder.onstop=async()=>{const target=selected;try{recordStream.getTracks().forEach(t=>t.stop())}catch(e){}recordStream=null;recorder=null;draw();const blob=new Blob(recordChunks,{type:'audio/webm'});recordChunks=[];const arr=await blob.arrayBuffer();const buffer=await ctx.decodeAudioData(arr.slice(0));pads[target].buffer=buffer;pads[target].name='REC '+String(target+1).padStart(2,'0');pads[target].tag='MIC REC';status('RECORDED TO PAD '+(target+1));draw()};recorder.start();status('RECORDING TO PAD '+(selected+1)+'... TAP REC TO STOP');draw()}catch(e){recorder=null;status('MIC BLOCKED OR UNAVAILABLE')}}
document.getElementById('wake').onclick=async()=>{await wake();status('AUDIO ACTIVE')};
document.getElementById('file').onchange=async e=>{const f=e.target.files[0];if(f)await chop(f);e.target.value=''};
document.getElementById('stop').onclick=panic;document.getElementById('panic').onclick=panic;
document.getElementById('choke').onclick=()=>{choke=!choke;document.getElementById('choke').textContent='CHOKE '+(choke?'ON':'OFF');if(choke)panic();status('CHOKE '+(choke?'ON':'OFF'))};
document.getElementById('record').onclick=toggleRecord;document.getElementById('reverse').onclick=reverseSelected;document.getElementById('randomize').onclick=randomizePads;
document.getElementById('clear').onclick=()=>{clearPad(selected);status('PAD CLEARED');draw()};
document.getElementById('clearBank').onclick=()=>{const start=selected<8?0:8;for(let i=start;i<start+8;i++)clearPad(i);status('BANK CLEARED');draw()};
document.getElementById('clearAll').onclick=()=>clearAll(true);
document.getElementById('perf').onclick=()=>{document.body.classList.toggle('performance');status(document.body.classList.contains('performance')?'PERFORMANCE MODE':'NORMAL MODE')};
document.getElementById('pitch').onclick=()=>{dirtyPitch=!dirtyPitch;document.getElementById('pitch').textContent='DIRTY PITCH '+(dirtyPitch?'ON':'OFF');status('DIRTY PITCH '+(dirtyPitch?'ON':'OFF'))};
document.getElementById('copyPad').onclick=()=>{const p=pads[selected];if(!p.buffer){status('NOTHING TO COPY');return}copiedBuffer=cloneBuffer(p.buffer);copiedName=p.name;status('COPIED PAD '+(selected+1))};
document.getElementById('pastePad').onclick=()=>{if(!copiedBuffer){status('COPY A PAD FIRST');return}pads[selected].buffer=cloneBuffer(copiedBuffer);pads[selected].name=copiedName+' COPY';pads[selected].tag='PASTED';status('PASTED TO PAD '+(selected+1));draw()};
document.addEventListener('keydown',e=>{const key=e.key.toLowerCase(),i=keys.indexOf(key);if(i>-1){e.preventDefault();if(heldKeys.has(key)||e.repeat)return;heldKeys.add(key);selected=i;play(i)}if(key===' '){e.preventDefault();panic()}});
document.addEventListener('keyup',e=>heldKeys.delete(e.key.toLowerCase()));
document.addEventListener('visibilitychange',()=>{if(document.hidden)panic()});
draw();
</script>
</body>
</html>
