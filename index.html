<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>THE MATTMACHINE</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#fff;--fg:#000;--soft:#f3f3f3}
body{margin:0;background:var(--bg);color:var(--fg);font-family:Arial,Helvetica,sans-serif;overflow-x:hidden}
main{max-width:1100px;margin:auto;padding:12px}
.header{border:2px solid #000;padding:14px;margin-bottom:10px;background:#fff}.small{font-size:.68rem;letter-spacing:.22em;font-weight:700;margin-bottom:6px}
h1{margin:0;font-size:clamp(2rem,8vw,5rem);line-height:.9;font-weight:900;letter-spacing:-.06em}.desc{margin-top:8px;font-size:.88rem;font-weight:700;max-width:820px;line-height:1.35}
.grid{display:grid;gap:8px}.top,.controls,.tools{grid-template-columns:repeat(4,1fr);margin-bottom:10px}.pads{grid-template-columns:repeat(4,1fr)}
button,label,select,a{background:#fff;color:#000;border:2px solid #000;min-height:48px;padding:8px;font-weight:900;text-decoration:none;display:flex;align-items:center;justify-content:center;cursor:pointer;text-align:center}
button:hover,label:hover,a:hover,select:hover{background:#eee}.danger{background:#000;color:#fff}.danger:hover{background:#222}
.pad{min-height:96px;display:flex;flex-direction:column;align-items:flex-start;justify-content:flex-start;text-align:left;position:relative;padding:10px;touch-action:pan-y;overflow:hidden;user-select:none}
.pad small{font-size:.62rem;font-weight:900;letter-spacing:.1em}.pad strong{font-size:.88rem;margin-top:10px;line-height:1}.pad em{font-style:normal;font-size:.58rem;font-weight:900;margin-top:auto;opacity:.72}
.pad::after{content:"";position:absolute;right:0;bottom:0;width:32px;height:32px;border-right:2px solid #000;border-bottom:2px solid #000;clip-path:polygon(100% 0,100% 100%,0 100%)}
.loaded{background:var(--soft)}.playing{background:#000;color:#fff}.looping{outline:3px solid #000}.selected{box-shadow:inset 0 0 0 3px #000}.recording{animation:pulse .45s infinite alternate;background:#000;color:#fff}
@keyframes pulse{from{filter:invert(0)}to{filter:invert(1)}}
#status{grid-column:1/-1;font-size:.72rem;font-weight:900;padding:2px 0;min-height:18px}.footer{margin-top:10px;border:2px solid #000;padding:10px;font-size:.72rem;font-weight:900;display:flex;justify-content:space-between;gap:8px}
body.performance main{max-width:none;padding:6px}body.performance .top,body.performance .footer{display:none}body.performance .pad{min-height:18vh;font-size:1.2rem}
@media(max-width:760px){.top,.controls,.tools,.pads{grid-template-columns:1fr 1fr}.pad{min-height:78px;padding:8px}.pad strong{font-size:.76rem;margin-top:6px}button,label,select,a{min-height:42px;font-size:.72rem;padding:6px}main{padding:8px}.header{padding:10px}.desc{font-size:.78rem}}
</style>
</head>
<body>
<main>
<div class="header"><div class="small">INDUSTRIAL LOOP CHOPPER SYSTEM</div><h1>THE MATTMACHINE</h1><div class="desc">IMPORT AUDIO. AUTO CHOP. TAP FOR ONE-SHOT. HOLD FOR LOOP. CLEANED MOBILE TOUCH + GLOBAL CHOKE.</div></div>
<div class="grid top"><a href="https://bearicide.github.io/">MAIN</a><a href="https://bearicide.github.io/music-toys/">TOOLS</a><a href="https://bearicide.github.io/MATTBEARCADE/">ARCADE</a><a href="https://bearicide.github.io/examples/">EXAMPLES</a></div>
<div class="grid controls"><button id="wake">WAKE</button><label>IMPORT<input id="file" type="file" accept="audio/*" hidden></label><button id="stop" class="danger">STOP</button><select id="sliceCount"><option value="16">16 CHOPS</option><option value="8">8 CHOPS</option><option value="4">4 CHOPS</option></select><div id="status">SYSTEM READY</div></div>
<div id="pads" class="grid pads"></div>
<div class="grid tools"><button id="choke">CHOKE ON</button><button id="record">REC PAD</button><button id="reverse">REVERSE PAD</button><button id="randomize">RANDOMIZE</button><button id="clear">CLEAR PAD</button><button id="clearAll">CLEAR ALL</button><button id="perf">PERFORMANCE</button><button id="panic" class="danger">PANIC</button></div>
<div class="footer"><div>MATTBEAR SYSTEMS</div><div>bearicide.github.io</div></div>
</main>
<script>
const keys=['1','2','3','4','q','w','e','r','a','s','d','f','z','x','c','v'];
const pads=Array.from({length:16},(_,i)=>({name:'CHOP '+(i+1),key:keys[i],buffer:null,playing:false,looping:false,tag:'EMPTY'}));
let ctx,master,selected=0,choke=true,activeLoop=null,dirtyPitch=false;
let recorder=null,recordChunks=[],recordStream=null;
const activeShots=new Set(),heldKeys=new Set();
const padsEl=document.getElementById('pads'),statusEl=document.getElementById('status');
function status(t){statusEl.textContent=t}
async function wake(){if(!ctx){ctx=new(window.AudioContext||window.webkitAudioContext)();master=ctx.createGain();master.gain.value=.9;master.connect(ctx.destination)}if(ctx.state!=='running')await ctx.resume()}
function createGain(){const g=ctx.createGain();g.gain.setValueAtTime(0,ctx.currentTime);g.gain.linearRampToValueAtTime(.9,ctx.currentTime+.005);g.connect(master);return g}
function fadeAndStop(source,gain,time=.015){if(!source)return;try{gain.gain.linearRampToValueAtTime(0,ctx.currentTime+time);source.stop(ctx.currentTime+time+.002)}catch(e){}setTimeout(()=>{try{source.disconnect()}catch(e){}try{gain.disconnect()}catch(e){}},40)}
function panic(){if(activeLoop){fadeAndStop(activeLoop.source,activeLoop.gain);activeLoop=null}activeShots.forEach(s=>fadeAndStop(s.source,s.gain));activeShots.clear();pads.forEach(p=>{p.playing=false;p.looping=false});draw();status('STOPPED')}
function draw(){padsEl.innerHTML='';pads.forEach((pad,i)=>{const b=document.createElement('button');b.className='pad '+(pad.buffer?'loaded ':'')+(pad.playing?'playing ':'')+(pad.looping?'looping ':'')+(i===selected?'selected ':'');b.innerHTML=`<small>${pad.key.toUpperCase()}</small><strong>${pad.name}</strong><em>${pad.tag}</em>`;let held=false,startX=0,startY=0,moved=false,timer;
b.onpointerdown=e=>{selected=i;startX=e.clientX;startY=e.clientY;moved=false;held=false;timer=setTimeout(()=>{if(!moved){held=true;startLoop(i)}},260);draw()};
b.onpointermove=e=>{const dx=Math.abs(e.clientX-startX),dy=Math.abs(e.clientY-startY);if(dx>12||dy>12){moved=true;clearTimeout(timer)}};
b.onpointerup=e=>{clearTimeout(timer);if(moved)return;if(held)panic();else play(i)};
b.onpointercancel=()=>clearTimeout(timer);
padsEl.appendChild(b)})}
function reverseBuffer(buffer){const out=ctx.createBuffer(buffer.numberOfChannels,buffer.length,buffer.sampleRate);for(let ch=0;ch<buffer.numberOfChannels;ch++){const src=buffer.getChannelData(ch),copy=new Float32Array(src.length);for(let i=0;i<src.length;i++)copy[i]=src[src.length-1-i];const fade=Math.min(220,copy.length>>1);for(let i=0;i<fade;i++){copy[i]*=i/fade;copy[copy.length-1-i]*=i/fade}out.copyToChannel(copy,ch)}return out}
async function play(i){await wake();const p=pads[i];selected=i;if(!p.buffer)return;if(choke)panic();const source=ctx.createBufferSource(),gain=createGain(),shot={source,gain,index:i};source.buffer=p.buffer;if(dirtyPitch)source.playbackRate.value=.9+Math.random()*.2;source.connect(gain);source.onended=()=>{activeShots.delete(shot);p.playing=false;draw()};activeShots.add(shot);p.playing=true;source.start();draw()}
async function startLoop(i){await wake();const p=pads[i];if(!p.buffer)return;if(activeLoop)panic();const source=ctx.createBufferSource(),gain=createGain();source.buffer=p.buffer;source.loop=true;source.connect(gain);source.start();activeLoop={source,gain,index:i};p.playing=true;p.looping=true;draw()}
function cutBuffer(source,start,end){const sr=source.sampleRate,s=Math.floor(start*sr),e=Math.floor(end*sr),len=Math.max(1,e-s),out=ctx.createBuffer(source.numberOfChannels,len,sr);for(let ch=0;ch<source.numberOfChannels;ch++){const data=source.getChannelData(ch).slice(s,e);out.copyToChannel(data,ch)}return out}
async function chop(file){await wake();panic();const arr=await file.arrayBuffer();const source=await ctx.decodeAudioData(arr.slice(0));const count=parseInt(document.getElementById('sliceCount').value,10),sliceLength=source.duration/count;for(let i=0;i<16;i++)pads[i]={name:'CHOP '+(i+1),key:keys[i],buffer:null,playing:false,looping:false,tag:'EMPTY'};for(let i=0;i<count;i++){pads[i].buffer=cutBuffer(source,i*sliceLength,(i+1)*sliceLength);pads[i].tag='LOADED'}status('CHOPPED '+count+' SLICES');draw()}
async function toggleRecord(){await wake();if(recorder&&recorder.state==='recording'){recorder.stop();return}try{recordStream=await navigator.mediaDevices.getUserMedia({audio:true});recordChunks=[];recorder=new MediaRecorder(recordStream);recorder.ondataavailable=e=>{if(e.data.size)recordChunks.push(e.data)};recorder.onstop=async()=>{const blob=new Blob(recordChunks,{type:'audio/webm'});recordStream.getTracks().forEach(t=>t.stop());const arr=await blob.arrayBuffer();pads[selected].buffer=await ctx.decodeAudioData(arr.slice(0));pads[selected].name='REC '+(selected+1);pads[selected].tag='MIC REC';recorder=null;status('RECORDED');draw()};recorder.start();status('RECORDING...')}catch(e){status('MIC BLOCKED')}}
document.getElementById('wake').onclick=async()=>{await wake();status('AUDIO ACTIVE')};
document.getElementById('file').onchange=async e=>{if(e.target.files[0])await chop(e.target.files[0]);e.target.value=''};
document.getElementById('stop').onclick=panic;document.getElementById('panic').onclick=panic;
document.getElementById('record').onclick=toggleRecord;
document.getElementById('reverse').onclick=()=>{const p=pads[selected];if(!p.buffer)return;p.buffer=reverseBuffer(p.buffer);p.tag='REVERSED';status('REVERSED PAD');draw()};
document.getElementById('randomize').onclick=()=>{pads.sort(()=>Math.random()-.5);status('RANDOMIZED');draw()};
document.getElementById('clear').onclick=()=>{pads[selected].buffer=null;pads[selected].tag='EMPTY';status('PAD CLEARED');draw()};
document.getElementById('clearAll').onclick=()=>{pads.forEach((p,i)=>pads[i]={name:'CHOP '+(i+1),key:keys[i],buffer:null,playing:false,looping:false,tag:'EMPTY'});panic();status('ALL CLEARED');draw()};
document.getElementById('perf').onclick=()=>document.body.classList.toggle('performance');
document.getElementById('choke').onclick=()=>{choke=!choke;document.getElementById('choke').textContent='CHOKE '+(choke?'ON':'OFF')};
document.addEventListener('keydown',e=>{const key=e.key.toLowerCase(),i=keys.indexOf(key);if(i>-1&&!heldKeys.has(key)){heldKeys.add(key);play(i)}});
document.addEventListener('keyup',e=>heldKeys.delete(e.key.toLowerCase()));
draw();
</script>
</body>
</html>
